<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boxado Unit — Konfigurator 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--brand:#E73F19;--brand-light:#fcece8;--black:#1d1d1b;--g100:#1f1f1f;--g70:#747474;--g60:#585858;--g20:#dadada;--g10:#f0f0f0;--g05:#f9f9f9;--white:#fff;--font:'Poppins',sans-serif;--r-s:8px;--r-m:12px;--r-l:16px;--r-xl:24px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--g05);color:var(--g100);font-size:12px;line-height:1.5;}
.shell{max-width:1440px;margin:0 auto;padding:16px;display:flex;gap:15px;min-height:100vh;}
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar-card{background:var(--white);border:1px solid var(--g20);border-radius:var(--r-xl);display:flex;flex-direction:column;flex:1;overflow:hidden;}
.sidebar-content{padding:16px;display:flex;flex-direction:column;gap:12px;flex:1;overflow-y:auto;}
.sidebar-title{font-size:14px;font-weight:600;color:var(--black);}
.series-tabs{display:flex;gap:10px;}
.series-tab{flex:1;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-s);border:1px solid var(--g20);background:none;font-family:var(--font);font-size:12px;font-weight:600;color:var(--g100);cursor:pointer;transition:all .15s;}
.series-tab:hover{border-color:var(--g70);}
.series-tab.active{background:var(--brand-light);border-color:transparent;color:var(--brand);}
.variant-list{display:flex;flex-direction:column;gap:8px;flex:1;}
.variant-item{border:1px solid var(--g10);border-radius:var(--r-s);padding:12px;cursor:pointer;transition:all .15s;background:none;font-family:var(--font);text-align:left;width:100%;}
.variant-item:hover{border-color:var(--g20);}
.variant-item.active{border-color:var(--brand);}
.variant-header{display:flex;align-items:center;justify-content:space-between;}
.variant-name-wrap{display:flex;align-items:center;gap:6px;}
.variant-name{font-size:16px;font-weight:600;color:var(--g100);}
.variant-name span{color:var(--g60);}
.tag-popular{background:var(--brand-light);color:var(--brand);font-size:10px;font-weight:500;padding:6px;border-radius:4px;line-height:1;white-space:nowrap;}
.sq-badge{background:var(--g10);border-radius:var(--r-s);padding:4px 6px;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--g100);flex-shrink:0;}
.sq-badge svg{width:12px;height:12px;}
.sq-badge .sup{font-size:7.74px;vertical-align:super;line-height:0;}
.variant-details{display:none;border-top:1px solid var(--g10);margin-top:10px;padding-top:12px;flex-direction:column;gap:12px;}
.variant-item.active .variant-details{display:flex;}
.detail-section{display:flex;flex-direction:column;}
.detail-section-title{font-size:9px;font-weight:500;color:var(--g70);text-transform:uppercase;letter-spacing:0.45px;margin-bottom:8px;}
.detail-rows{display:flex;flex-direction:column;gap:8px;}
.detail-row{display:flex;align-items:center;justify-content:space-between;}
.detail-label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--black);}
.detail-label svg{width:16px;height:16px;color:var(--brand);flex-shrink:0;}
.detail-value{font-size:12px;font-weight:400;color:var(--g100);}
/* Tooltip */
.info-btn{background:none;border:none;cursor:pointer;padding:0;display:inline-flex;align-items:center;position:relative;}
.info-btn svg{width:16px;height:16px;color:var(--g70)!important;}
.tooltip{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#3a3a3a;color:#fff;font-size:11px;font-family:var(--font);font-weight:400;padding:8px 12px;border-radius:6px;white-space:nowrap;z-index:100;pointer-events:none;transition:opacity .15s;}
.tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#3a3a3a;}
.info-btn:hover .tooltip{visibility:visible;opacity:1;}
/* CTA */
.cta-wrap{padding:16px;padding-top:0;display:flex;flex-direction:column;gap:8px;}
.cta-primary{height:40px;background:var(--brand);color:#fff;border:none;border-radius:var(--r-s);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.cta-primary:hover{background:#c7340f;}
.cta-secondary{height:40px;background:none;border:1px solid var(--g20);border-radius:var(--r-s);font-family:var(--font);font-size:12px;font-weight:600;color:var(--g100);cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.cta-secondary:hover{border-color:var(--g70);}
/* Viewer */
.viewer-area{flex:1;min-width:0;display:flex;flex-direction:column;}
.viewer-card{background:var(--white);border:1px solid var(--g20);border-radius:var(--r-xl);overflow:hidden;flex:1;padding:12px;display:flex;flex-direction:column;}
.viewer-inner{background:var(--g10);border-radius:var(--r-m);flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:12px;min-height:400px;}
#cv{position:absolute;inset:0;width:100%;height:100%;cursor:grab;}
#cv:active{cursor:grabbing;}
.model-tag{position:absolute;top:18px;left:21px;z-index:2;line-height:0;}
.model-tag svg{display:block;}
.state-toggle{position:relative;z-index:2;background:var(--white);border-radius:var(--r-l);padding:6px;display:flex;gap:8px;box-shadow:0 1px 1.5px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.08);}
.state-btn{display:flex;align-items:center;gap:8px;padding:16px;border-radius:var(--r-s);border:1px solid transparent;background:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--black);cursor:pointer;transition:all .15s;height:56px;}
.state-btn:hover{background:var(--g10);}
.state-btn.active{background:var(--brand-light);border-color:var(--brand);}
.state-btn svg{width:24px;height:24px;color:var(--g70);transition:color .15s;}
.state-btn.active svg{color:var(--brand);}
.loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:var(--g10);z-index:10;transition:opacity .4s;}
.loader.hidden{opacity:0;pointer-events:none;}
.loader-ring{width:34px;height:34px;border:3px solid var(--g20);border-top-color:var(--brand);border-radius:50%;animation:spin .75s linear infinite;}
.loader-text{font-size:12px;color:var(--g70);font-weight:500;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Mobile */
@media(max-width:768px){
  .shell{flex-direction:column;padding:0;gap:4px;}
  .sidebar{width:100%;order:2;}
  .sidebar-card{border-radius:0;border-left:0;border-right:0;}
  .viewer-area{order:1;}
  .viewer-card{border-radius:0;border-left:0;border-right:0;border-top:0;}
  .viewer-inner{min-height:350px;}
  .model-tag{top:12px;left:12px;}
  .model-tag svg{transform:scale(0.6);transform-origin:top left;}
  .state-toggle{padding:6px;}
  .state-btn{height:40px;padding:8px 16px;flex:1;justify-content:center;}
  .state-btn svg{width:20px;height:20px;}
  .mobile-size-label{display:block;font-size:14px;font-weight:600;color:var(--black);padding:0 16px;margin-bottom:8px;}
  .cta-sticky{position:fixed;bottom:0;left:0;right:0;background:var(--white);padding:8px;display:flex;flex-direction:column;gap:8px;box-shadow:0 -4px 16px rgba(0,0,0,.08),0 -1px 3px rgba(0,0,0,.12);z-index:100;}
  .cta-desktop{display:none;}
  .sidebar-content{padding-bottom:120px;}
}
@media(min-width:769px){.cta-sticky{display:none;}.mobile-size-label{display:none;}}
@media(min-width:769px) and (max-width:1100px){.sidebar{width:260px;}}
</style>
</head>

    h+='<div class="detail-row"><span class="detail-label">'+IC.doorO+' Szer. drzwi</span><span class="detail-value">'+v.doorW+' mm</span></div>';
    h+='<div class="detail-row"><span class="detail-label">'+IC.doorC+' Wys. drzwi</span><span class="detail-value">'+v.doorH+' mm</span></div>';
    h+='</div></div>';

    // Boxy
    h+='<div class="detail-section">';
    h+='<div class="detail-section-title">Boxy</div>';
    h+='<div class="detail-rows">';
    h+='<div class="detail-row"><span class="detail-label">'+IC.box+' Ilość boxów ';
    h+='<button class="info-btn" tabindex="-1">'+IC.info+'<span class="tooltip">Ilość komór w ramach jednego unitu</span></button>';
    h+='</span><span class="detail-value">'+v.chambers+'</span></div>';
    h+='</div></div>';

    h+='</div>'; // end variant-details

    var item=document.createElement('div');
    item.className='variant-item'+(isA?' active':'');
    item.innerHTML=h;
    item.addEventListener('click',function(e){
      if(e.target.closest('.info-btn'))return; // don't select on tooltip click
      variant=v;renderList();updateUI();tRadius=getRadius();

}

function updateUI(){
  var el=document.getElementById('model-tag');

  var url=PDF[variant.id]||'#';

  var s=document.getElementById('pdf-btn-sticky');

  if(s){s.href=url;s.textContent=label;}

// Series tabs
document.querySelectorAll('.series-tab').forEach(function(t){
  t.addEventListener('click',function(){
    series=t.dataset.series;variant=DATA[series][0];
    document.querySelectorAll('.series-tab').forEach(function(x){x.classList.remove('active');});

// State toggle
document.querySelectorAll('.state-btn').forEach(function(b){

    state=b.dataset.state;
    document.querySelectorAll('.state-btn').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
  });
});

// ═══ WebGL ═══
var cv=document.getElementById('cv'),wrap=cv.parentElement;
var gl=cv.getContext('webgl')||cv.getContext('experimental-webgl');
var VS='attribute vec3 aP;attribute vec3 aN;uniform mat4 uMVP;uniform mat4 uM;varying vec3 vN;varying vec3 vW;void main(){vec4 w=uM*vec4(aP,1.);vW=w.xyz;vN=mat3(uM)*aN;gl_Position=uMVP*vec4(aP,1.);}';
var FS='precision mediump float;varying vec3 vN;varying vec3 vW;uniform vec3 uC;uniform vec3 uL1;uniform vec3 uL2;void main(){vec3 n=normalize(vN);float d1=max(dot(n,normalize(uL1-vW)),0.);float d2=max(dot(n,normalize(uL2-vW)),0.)*.3;gl_FragColor=vec4(uC*(0.28+0.65*d1+d2),1.);}';
function sh(t,s){var x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}
var prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS));gl.linkProgram(prog);gl.useProgram(prog);
var aP=gl.getAttribLocation(prog,'aP'),aN_a=gl.getAttribLocation(prog,'aN');
var uMVP=gl.getUniformLocation(prog,'uMVP'),uM_u=gl.getUniformLocation(prog,'uM');
var uC=gl.getUniformLocation(prog,'uC'),uL1=gl.getUniformLocation(prog,'uL1'),uL2=gl.getUniformLocation(prog,'uL2');
function mkBox(w,h,d){var hw=w/2,hh=h/2,hd=d/2;var F=[[[hw,-hh,-hd],[hw,-hh,hd],[hw,hh,hd],[hw,hh,-hd],[1,0,0]],[[-hw,-hh,hd],[-hw,-hh,-hd],[-hw,hh,-hd],[-hw,hh,hd],[-1,0,0]],[[-hw,hh,-hd],[hw,hh,-hd],[hw,hh,hd],[-hw,hh,hd],[0,1,0]],[[-hw,-hh,hd],[hw,-hh,hd],[hw,-hh,-hd],[-hw,-hh,-hd],[0,-1,0]],[[-hw,-hh,hd],[hw,-hh,hd],[hw,hh,hd],[-hw,hh,hd],[0,0,1]],[[hw,-hh,-hd],[-hw,-hh,-hd],[-hw,hh,-hd],[hw,hh,-hd],[0,0,-1]]];var v=[];for(var i=0;i<F.length;i++){var f=F[i],pts=[f[0],f[1],f[2],f[0],f[2],f[3]];for(var j=0;j<pts.length;j++)v.push(pts[j][0],pts[j][1],pts[j][2],f[4][0],f[4][1],f[4][2]);}return new Float32Array(v);}
var BUF={};function getBuf(w,h,d){var k=w.toFixed(4)+'_'+h.toFixed(4)+'_'+d.toFixed(4);if(!BUF[k]){var b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,mkBox(w,h,d),gl.STATIC_DRAW);BUF[k]=b;}return BUF[k];}
var m4=function(){return new Float32Array(16);};
function ident(m){m.fill(0);m[0]=m[5]=m[10]=m[15]=1;return m;}
function mul(o,a,b){for(var r=0;r<4;r++)for(var c=0;c<4;c++){var s=0;for(var k=0;k<4;k++)s+=a[r+k*4]*b[k+c*4];o[r+c*4]=s;}return o;}
function persp(m,fov,asp,n,f){m.fill(0);var t=1/Math.tan(fov/2);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=2*f*n/(n-f);return m;}
function lkAt(m,ex,ey,ez,cx,cy,cz){var zx=ex-cx,zy=ey-cy,zz=ez-cz,l=Math.sqrt(zx*zx+zy*zy+zz*zz);zx/=l;zy/=l;zz/=l;var xx=zz,xz=-zx;l=Math.sqrt(xx*xx+xz*xz);if(l<1e-6){xx=1;xz=0;}else{xx/=l;xz/=l;}var yx=zy*xz,yy=zz*xx-zx*xz,yz=-zy*xx;m[0]=xx;m[1]=yx;m[2]=zx;m[3]=0;m[4]=0;m[5]=yy;m[6]=zy;m[7]=0;m[8]=xz;m[9]=yz;m[10]=zz;m[11]=0;m[12]=-(xx*ex+xz*ez);m[13]=-(yx*ex+yy*ey+yz*ez);m[14]=-(zx*ex+zy*ey+zz*ez);m[15]=1;return m;}
var _t=m4(),_mvp=m4(),_proj=m4(),_view=m4(),_mod=m4();
function dBox(w,h,d,tx,ty,tz,col){ident(_mod);_mod[12]=tx;_mod[13]=ty;_mod[14]=tz;mul(_t,_proj,_view);mul(_mvp,_t,_mod);gl.uniformMatrix4fv(uMVP,false,_mvp);gl.uniformMatrix4fv(uM_u,false,_mod);gl.uniform3fv(uC,col);gl.bindBuffer(gl.ARRAY_BUFFER,getBuf(w,h,d));gl.vertexAttribPointer(aP,3,gl.FLOAT,false,24,0);gl.vertexAttribPointer(aN_a,3,gl.FLOAT,false,24,12);gl.enableVertexAttribArray(aP);gl.enableVertexAttribArray(aN_a);gl.drawArrays(gl.TRIANGLES,0,36);}
function dDoor(dw,dh,dt,hx,hy,hz,ang,col){ident(_mod);var c=Math.cos(ang),s=Math.sin(ang);_mod[0]=c;_mod[2]=-s;_mod[8]=s;_mod[10]=c;_mod[12]=hx+dw/2*c;_mod[13]=hy;_mod[14]=hz-dw/2*s;mul(_t,_proj,_view);mul(_mvp,_t,_mod);gl.uniformMatrix4fv(uMVP,false,_mvp);gl.uniformMatrix4fv(uM_u,false,_mod);gl.uniform3fv(uC,col);gl.bindBuffer(gl.ARRAY_BUFFER,getBuf(dw,dh,dt));gl.vertexAttribPointer(aP,3,gl.FLOAT,false,24,0);gl.vertexAttribPointer(aN_a,3,gl.FLOAT,false,24,12);gl.enableVertexAttribArray(aP);gl.enableVertexAttribArray(aN_a);gl.drawArrays(gl.TRIANGLES,0,36);}
var ST=[0.82,0.82,0.80],RF=[0.72,0.72,0.70],DK=[0.15,0.15,0.15],FL=[0.88,0.87,0.85],HL=[0.65,0.65,0.63];
function scene(){
  var L=variant.length/1000,W=2.246,H=2.290,T=0.025,ch=variant.chambers,cw=L/ch,da=state==='open'?Math.PI*0.58:0;
  gl.uniform3f(uL1,5,7,4);gl.uniform3f(uL2,-4,3,-4);
  dBox(L+0.3,T*0.3,W+0.3,0,0,0,FL);
  for(var c=0;c<ch;c++){
    var ox=c*cw-L/2+cw/2;
    dBox(cw-T*2,H,T,ox,H/2,-W/2+T/2,ST);
    if(c===0)dBox(T,H,W,-L/2+T/2,H/2,0,ST);
    dBox(T,H,W,ox+cw/2-T/2,H/2,0,ST);
    dBox(cw,T*1.2,W,ox,H+T*0.1,0,RF);
    for(var r=1;r<=6;r++)dBox(cw-T*4,T*0.5,T*0.4,ox,H*r/7,-W/2+T*1.2,DK);
    var crs=[[ox-cw/2,-W/2],[ox-cw/2,W/2],[ox+cw/2,-W/2],[ox+cw/2,W/2]];
    for(var ci=0;ci<4;ci++){if(c>0&&Math.abs(crs[ci][0]-(ox-cw/2))<0.001)continue;dBox(T*1.8,H+T*0.3,T*1.8,crs[ci][0],H/2,crs[ci][1],DK);}
    dDoor(cw-T*2,H-T,T*0.8,ox-cw/2,H/2,W/2,da,ST);
    if(state==='closed'){for(var r2=0;r2<6;r2++)dBox(cw-T*5,T*0.4,T*0.9,ox,H*(0.1+r2*0.14),W/2+T*0.45,DK);dBox(0.20,0.15,0.03,ox-cw/2+(cw-T*2)*0.65,H/2,W/2+T*0.45,HL);dBox(0.09,0.025,0.025,ox-cw/2+(cw-T*2)*0.65,H/2,W/2+T*0.45+0.03,DK);}
  }
}
// Camera — full range (0.05 to 0.49*PI) for level view
var theta=0.5,phi=0.85,tTheta=0.5,tPhi=0.85,tRadius=4,drag=false,lx=0,ly=0;
function getRadius(){return Math.max(variant.length/1000,2.246)*2.8;}
cv.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('touchstart',function(e){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
window.addEventListener('mouseup',function(){drag=false;});
window.addEventListener('touchend',function(){drag=false;});
window.addEventListener('mousemove',function(e){if(!drag)return;tTheta-=(e.clientX-lx)*0.008;tPhi=Math.max(0.05,Math.min(Math.PI*0.49,tPhi-(e.clientY-ly)*0.007));lx=e.clientX;ly=e.clientY;});
window.addEventListener('touchmove',function(e){if(!drag)return;tTheta-=(e.touches[0].clientX-lx)*0.008;tPhi=Math.max(0.05,Math.min(Math.PI*0.49,tPhi-(e.touches[0].clientY-ly)*0.007));lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
cv.addEventListener('wheel',function(e){e.preventDefault();tRadius=Math.max(0.5,Math.min(16,tRadius+e.deltaY*0.004));},{passive:false});
function resize(){cv.width=wrap.clientWidth;cv.height=wrap.clientHeight;gl.viewport(0,0,cv.width,cv.height);}
window.addEventListener('resize',resize);resize();
var radius=tRadius;
(function frame(){
  requestAnimationFrame(frame);
  theta+=(tTheta-theta)*0.1;phi+=(tPhi-phi)*0.1;radius+=(tRadius-radius)*0.1;
  var H=2.290,cy=H/2,ex=radius*Math.sin(phi)*Math.sin(theta),ey=cy+radius*Math.cos(phi),ez=radius*Math.sin(phi)*Math.cos(theta);
  persp(_proj,0.60,cv.width/cv.height,0.05,60);
  lkAt(_view,ex,ey,ez,0,cy,0);
  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(0.941,0.941,0.941,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.useProgram(prog);
  scene();
})();
tRadius=getRadius();updateUI();renderList();
document.getElementById('loader').classList.add('hidden');
</script>
